services:
  fifa-predictor:
    build: .
    ports:
      - "5001:5000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./fifa_model.pkl:/app/fifa_model.pkl
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus